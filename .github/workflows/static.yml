name: Generate Static File Index
on:
  push:
    branches: [ main ]   # 如果你的默认分支是 master，请改过来
permissions:
  contents: write
  pages: write
  id-token: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Generate index.html (HTML 2.0 compatible)
        run: |
          python3 -c "
import os
import html
from urllib.parse import quote
from pathlib import Path

# 纯 HTML 2.0 头部，无任何样式或脚本
html_content = '''<!DOCTYPE html PUBLIC "-//IETF//DTD HTML 2.0//EN">
<html>
<head>
<TITLE>File Index</TITLE>
</head>
<body>
<H1>File List</H1>
<HR>
<UL>
'''

# 递归收集所有文件
for p in sorted(Path('.').rglob('*')):
    if p.is_file():
        # 排除 .git 目录和生成的 index.html 自身
        if '.git' in str(p) or p.name == 'index.html':
            continue
        # 转换为 Unix 风格的相对路径
        rel_path = str(p).replace('\\', '/')
        # 转义显示文本（防止 & < > 破坏 HTML）
        display = html.escape(rel_path)
        # URL 编码（处理空格、中文等）
        encoded = quote(rel_path)
        # 仅生成一个直链，无任何强制下载属性
        html_content += f'  <LI><A HREF=\"{encoded}\">{display}</A>\n'

html_content += '''</UL>
<HR>
</body>
</html>
'''

with open('index.html', 'w', encoding='utf-8') as f:
    f.write(html_content)
"
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4