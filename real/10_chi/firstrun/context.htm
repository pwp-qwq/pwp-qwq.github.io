	<!--
var connected = parent.window.external.IsNetConnected();


function RPOnStateChange( state )
{
	if (( connected )&&( state == 0 ))
	{
		parent.window.external.OpenURLInPlayerBrowser("dcp://getmedia/getmedia.ini?firstrun","_rphome");
	}
}

var timestamp = 0.00
var timecode = '00:00' 
function RPOnPositionLengthChange(position, length)
{
	secs = parseInt(position / 1000)
	mins = parseInt(secs / 60)
	timestamp = (Math.round((mins+((secs%60)/100))
	* Math.pow(10,2))/Math.pow(10,2))
	timecode = timestamp + ''
	if (timecode.indexOf('.')=='-1')
	{ timecode = timecode + '.00' }
	if (timecode.charAt(1) == '.')
	{ timecode = '0' + timecode }
	if (timecode.length == 4) {
	timecode = timecode + '0' }
	timecode = timecode.substring(0,2)
	+ ':' + timecode.substring(3,5)

	if (timestamp >= 0.06)
	{
		MM_showHideLayers('image','','show');
	}
	if (timecode == '00:38')
	{
		if(connected)
		{
			MM_showHideLayers('linkson','','show');
			parent.window.external.OpenURLInPlayerBrowser("dcp://getmedia/getmedia.ini?firstrun");
		}
		else
		{
			MM_showHideLayers('linksoff','','show');
		}
	}
}
	 
function MM_findObj(n, d) { //v4.01
  var p,i,x;  if(!d) d=document; if((p=n.indexOf("?"))>0&&parent.frames.length) {
    d=parent.frames[n.substring(p+1)].document; n=n.substring(0,p);}
  if(!(x=d[n])&&d.all) x=d.all[n]; for (i=0;!x&&i<d.forms.length;i++) x=d.forms[i][n];
  for(i=0;!x&&d.layers&&i<d.layers.length;i++) x=MM_findObj(n,d.layers[i].document);
  if(!x && d.getElementById) x=d.getElementById(n); return x;
}

function MM_showHideLayers() { //v6.0
  var i,p,v,obj,args=MM_showHideLayers.arguments;
  for (i=0; i<(args.length-2); i+=3) if ((obj=MM_findObj(args[i]))!=null) { v=args[i+2];
    if (obj.style) { obj=obj.style; v=(v=='show')?'visible':(v=='hide')?'hidden':v; }
    obj.visibility=v; }
}
//-->
