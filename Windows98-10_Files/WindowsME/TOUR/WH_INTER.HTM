<P CLASS="toccon">
如果您的家中有多台计算机，Windows Millennium Edition 使您可轻松地将每台计算机配置为使用相同的 Internet Explorer 和 Outlook Express 设置。这样，您就不必为每台计算机设置不同的帐户，或尽力想办法将计算机约束在同一帐户中。</P>

<P CLASS="toccon">只需运行要复制其设置的计算机上的“家庭网络”向导，然后按照指令操作即可。Windows Me 会将该设置复制到您所提供的软盘中，然后，您需要将此软盘插入到需添加该设置的每台计算机中。</P>
