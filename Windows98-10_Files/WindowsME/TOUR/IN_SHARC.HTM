<TD WIDTH="75%" VALIGN="TOP" ALIGN="left">

<P CLASS="toccon">

现在您在家中就可以实现所有计算机共享一个 Internet 连接。这就意味着每台计算机上都可以使用 Internet 及电子邮件帐号，而无需为每台计算机单独配置连接。无论连接使用的是传统的拨号调制解调器和电话线，还是高速连接如电缆或者数字用户线路 (DSL)，均可采用共享 Internet 连接的方式。</P>

<IMG SRC="images/in_sharc.gif" WIDTH="146" HEIGHT="112" ALT="此图片显示的是一个房间中有两台联网的计算机正在共享与 Internet 和打印机的连接" BORDER="0" CLASS="imgindent">

<P CLASS="toccon">有关详情，请在“帮助和支持”的“搜索”框中键入“Internet 连接共享”。</P>

<P CLASS="toccon">
大多数 Internet 服务提供商 (ISP) 都支持使用“Internet 连接共享” 。但是有些需要在实现 Internet 连接共享之前进行特殊的设置。</P>
</TD>
