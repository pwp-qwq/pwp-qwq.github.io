<P CLASS="toccon">
MSN Messenger Service 向您显示您的朋友何时连接到 Internet，以便您可交换即时消息或同时与几个朋友聊天，邀请一个朋友在 Internet 上玩游戏，或者使用 NetMeeting 举行一个视听会议。</P>

<P CLASS="toccon">另外，MSN Messenger Service 在电子邮件到达 Hotmail 邮箱后提醒您。</P>

<P CLASS="toccon">有关详情，请在“帮助和支持”中“搜索”框内键入“MSN Messenger”。</P>
