<P CLASS="toccon">

有一个很棒的新多媒体文件要和家中其他人共享吗？也许此文件对于软盘来说太大了。也许您有一个放满文档的文件夹想让他人查看，那么怎么实现呢？现在很容易就可以办到，您只需在网络上共享该文件或文件夹就可以了。您甚至还可以决定谁能够查看该信息以及他们是否可以更改该信息。</P>

<P CLASS="toccon">有关详情，请在“帮助和支持”的“搜索”框中键入“控制访问”。</P>
