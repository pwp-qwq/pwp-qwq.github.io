<P CLASS="toccon">
Windows Millennium Edition 使您可以更方便地在计算机上保存或浏览数字相机或扫描仪上的照片。您可以组织自己的照片，甚至可以利用这些照片创建屏幕保护程序。使用“Windows Movie Maker”，可以创建并编辑自己的电影或幻灯片。而玩游戏更加刺激，因为既可以玩网络版也可以玩 Internet 版的多人游戏。单击左侧标题可以了解更多内容！</P>
