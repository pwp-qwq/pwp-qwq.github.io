<P CLASS="toccon">
无论是用数字相机拍摄的照片、还是从 Internet 上下载的照片，保存到“My Pictures”文件夹中都很方便。“My Pictures”文件夹位于“我的文档”文件夹下，该文件夹提供了所选照片的缩略图，这样不必在程序中逐个打开就可对照片进行预览。</P>
