<P CLASS="toccon">现在从计算机的桌面上就可以轻松完成您的任务，因为常用项目已经在桌面上随时待命。而且您还可以通过单击“开始”按钮找到程序、文档以及其他更多的项目。</P>

<P CLASS="toccon">您可以将桌面个性化为显示即时 Web 内容，这样在工作的同时，您就可以跟踪自己最关注的股票信息，了解当地交通状况，而且如果您对 Windows Me 或教程中的其他主题有疑问，或者想了解更多信息，则“帮助和支持”可以给出答案。请单击左侧标题，以了解更多内容！ <BR></P>
