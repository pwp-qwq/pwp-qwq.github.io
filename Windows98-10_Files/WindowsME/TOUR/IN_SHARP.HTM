<TD WIDTH="75%" VALIGN="TOP" ALIGN="left">


<P CLASS="toccon">
打印共享意味着在家庭网络中，您可以将某一台计算机上的文档在与另一台计算机相连的打印机上打印出来。这使无需软盘而将文件从一台计算机传至另一台计算机打印成为可能。</P>

<P CLASS="toccon">您可以使用“家庭网络向导”或“控制面板”中的打印机文件夹共享打印机。</P>

<P CLASS="toccon">有关详情，请在“帮助和支持”的“搜索”框中键入“访问控制”。</P>
