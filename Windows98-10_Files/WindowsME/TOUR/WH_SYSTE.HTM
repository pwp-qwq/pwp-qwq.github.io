<P CLASS="toccon">
有时会有意外情况发生。也许当您从 CD 或 Internet 安装产品或程序时，一向可靠的计算机可能会突然出现故障。有时甚至在将程序卸载后，故障仍然存在。</P> 

<P CLASS="toccon">现在您可以将计算机还原到出现故障前指定的某一状态。您不会丢失工作结果，如电子邮件或对现有文档的任何更改。您只需还原计算机的强大性能即可，还可因此避免打耗时的计算机支持电话。</P>
<P CLASS="toccon">有关详情，请在“帮助和支持”内的“搜索”框中键入“系统还原”。</P>
