<P CLASS="toccon">
有关桌面的最佳功能之一是可以将其个性化，您可以只改变颜色或添加背景图案或照片，也可以通过添加定期更新的万维网新闻标题或股票报价之类的动态内容将桌面变成具有生命一样。</P>

<P CLASS="toccon">而且个性化的目的并不仅仅是有趣，您还可以将最常用的程序添加到“开始”菜单，并将最喜爱的程序和文档的快捷方式添加到桌面上，这样使用之时只需轻轻一下单击即可。</P>

<P CLASS="toccon">如要了解更多信息，请在“帮助和支持”的“搜索”框中键入“自定义桌面”。</P>

</TD></TR>
