<TD WIDTH="75%" VALIGN="TOP" ALIGN="left">

<P CLASS="toccon">
利用“控制面板”中的“扫描仪和照相机”文件夹，放置数字照片轻松到只需单击几下鼠标。</P>

<IMG SRC="images/en_camer.gif" WIDTH="357" HEIGHT="252" ALT="此图像显示“扫描仪和照相机”窗口" BORDER="0" CLASS="imgindent">

<P CLASS="toccon">
打开此文件夹之后，单击“添加设备”可以获得在计算机上安装扫描仪以及数字静态或视频相机的帮助。可以使用该功能随时安装其他图像捕获设备。</P>

<P CLASS="toccon">安装硬件后，可以利用“扫描仪和照相机”向导将照片保存到计算机中。该向导的打开方法是：单击“开始”，指向“程序”，然后指向“附件”。</P>

<P CLASS="toccon">如要了解更多信息，请在“帮助和支持”的“搜索”框中键入“扫描仪和照相机”。</P>
</TD>
