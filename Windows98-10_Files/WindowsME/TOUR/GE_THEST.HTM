<TD WIDTH="75%" VALIGN="TOP" ALIGN="left">
<P CLASS="toccon">
您可以通过单击“开始”按钮在计算机上开始几乎任意一项活动。当单击“开始”按钮时，“开始”菜单即出现。它包括一个程序列表（许多程序列于子菜单下如“程序”或“附件”），您也可以打开最近使用过的文档，并且可以到“控制面板”中去更改设置。</P>

<P CLASS="toccon">除此之外，可以从“开始”菜单中打开“帮助和支持”，并且可以搜索您自己或其他计算机上的文件、文件夹或文档。当开始工作之后，“开始”菜单也是您关闭计算机的地方。</P>

<P CLASS="toccon">有关详情，请在“帮助和支持”的“搜索”框中键入“开始菜单”。</P>

<P CLASS="toccon">注意，当在新的计算机上安装 Windows Me 时，桌面上可能还包括其他项目。</P>
</TD>
